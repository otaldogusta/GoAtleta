name: Core CI

on:
  pull_request:
    paths:
      - "app/assistant/**"
      - "src/copilot/**"
      - "src/api/regulation-*.ts"
      - "src/api/regulation/**"
      - "supabase/functions/assistant/**"
      - "supabase/functions/_shared/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tsconfig.check.json"
      - "scripts/check-encoding.js"
  push:
    branches:
      - main
      - master
    paths:
      - "app/assistant/**"
      - "src/copilot/**"
      - "src/api/regulation-*.ts"
      - "src/api/regulation/**"
      - "supabase/functions/assistant/**"
      - "supabase/functions/_shared/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tsconfig.check.json"
      - "scripts/check-encoding.js"
  workflow_dispatch:

concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Run core tests
        run: npm run test:core

      - name: Run core typecheck
        run: npm run typecheck:core
