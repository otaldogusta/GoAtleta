name: Perf Hygiene

on:
  pull_request:
    paths:
      - "app/**"
      - "src/screens/**"
      - "src/observability/perf.ts"
      - "scripts/check-perf-hygiene.js"
      - "package.json"
      - ".github/workflows/perf-hygiene.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "src/screens/**"
      - "src/observability/perf.ts"
      - "scripts/check-perf-hygiene.js"
      - "package.json"
      - ".github/workflows/perf-hygiene.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:

concurrency:
  group: perf-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Screen Perf Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate perf markers
        run: npm run check:perf-hygiene
